# DropSense - Infraestrutura local de desenvolvimento
#
# Filosofia deste arquivo: rodar o minimo necessario com o minimo de RAM,
# mantendo os conceitos arquiteturais corretos (ver docs/01-CONTEXTO-PROJETO.md
# e a Parte 3 - Arquitetura no README de cada servico).
#
# - Kafka em modo KRaft (sem Zookeeper), single-node, heap limitado.
# - Postgres UNICO, com 3 databases logicos (um por servico) criados via
#   script de init.
#
# Nota sobre limites de memoria: usamos "mem_limit" direto no servico
# (em vez de "deploy.resources.limits.memory") porque esse ultimo so e
# garantido em modo Swarm - em "docker compose up" puro o comportamento
# varia entre versoes da CLI. "mem_limit" e honrado de forma confiavel
# em qualquer cenario.
#
# Nota sobre limites de CPU: pelo mesmo motivo acima, usamos "cpus"
# direto no servico (equivalente em CPU ao "mem_limit"). Isso vira uma
# cgroup CPU quota pro container - o Docker simplesmente pausa o
# processo quando ele excede a fracao de nucleo configurada num dado
# periodo (~100ms).
#
# Os valores abaixo assumem uma maquina de 4 nucleos logicos com 8GB de
# RAM (perfil comum de notebook de estudo). Ajuste proporcionalmente
# se o seu numero de nucleos for diferente:
#   - Linux/WSL: rode `nproc` num terminal.
#   - Docker Desktop (Mac/Windows): Settings > Resources > CPUs - esse
#     numero (da VM do Docker Desktop), e nao o do hardware fisico, e o
#     teto real que os containers competem entre si.
# Orcamento com 4 nucleos: kafka=1.5 + postgres=0.5 + ingestion=1.0 =
# 3.0 de 4 - sobra 1 nucleo de folga pro SO, pro proprio Docker Desktop
# e pro seu editor/terminal. Nunca aloque 100% dos nucleos aos
# containers: sem folga, a maquina toda fica lenta, nao so o Kafka.
#
# Sobre o Go especificamente: a partir do Go 1.25 (ago/2025), a runtime
# passou a ler a CPU quota do cgroup e ajustar GOMAXPROCS automaticamente
# (https://go.dev/blog/container-aware-gomaxprocs) - isso so vale se o
# go.mod do servico declarar `go 1.25` ou mais novo. Com isso, o "cpus"
# abaixo, por si so, ja basta: nao e mais necessario importar
# go.uber.org/automaxprocs manualmente (eh literalmente a mesma logica
# que a Uber escreveu, hoje embutida na stdlib). Se o go.mod ainda
# declarar uma versao anterior a 1.25, ou se quiser fixar um valor
# manualmente independente da deteccao automatica, descomente a linha
# GOMAXPROCS no environment do servico telemetry-ingestion abaixo.

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: dropsense-kafka
    mem_limit: 768m
    cpus: 1.5
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Conveniente em dev. Em producao os topicos seriam criados
      # explicitamente (com particoes/retencao definidas) e essa flag iria pra false.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
    volumes:
      - dropsense-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: dropsense-postgres
    mem_limit: 256m
    cpus: 0.5
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: dropsense
      POSTGRES_PASSWORD: dropsense_dev_only
      POSTGRES_DB: postgres
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
      - dropsense-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dropsense -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  telemetry-ingestion:
    build:
      context: ../services/telemetry-ingestion-go
      dockerfile: Dockerfile
    container_name: dropsense-telemetry-ingestion
    mem_limit: 64m
    cpus: 0.75
    ports:
      - "8080:8080"
    # GOMAXPROCS manual - so necessario se o go.mod deste servico
    # declarar uma versao do Go anterior a 1.25 (sem deteccao
    # automatica de cgroup), ou se quiser fixar o valor "na mao"
    # independente do que o runtime detectar. Em Go 1.25+ a linha
    # "cpus: 1.0" acima ja basta, isso aqui fica redundante (e o
    # proprio runtime ignora a env var se ela vier vazia/ausente).
    # environment:
    #   - GOMAXPROCS=1
    environment:
      - KAFKA_BROKERS=kafka:9092
      # WEATHER_POLL_INTERVAL: opcional, default é 30m (ver main.go).
      # Só setar se quiser um intervalo diferente de consulta ao
      # Open-Meteo - aceita qualquer valor que time.ParseDuration
      # entenda (ex.: "10m", "1h").
      # - WEATHER_POLL_INTERVAL=10m
    # Agora SIM precisa esperar o Kafka: o publisher real
    # (internal/kafka.Producer) substituiu o StdoutPublisher, então o
    # serviço não tem mais como funcionar sem o broker de pé. O Kafka
    # já tem healthcheck configurado acima, então usamos ele em vez de
    # só "started" (que marcaria como pronto antes do broker aceitar
    # conexões de fato).
    depends_on:
      kafka:
        condition: service_healthy

  # Orçamento de CPU revisado (4 núcleos): kafka=1.5 + postgres=0.5 +
  # telemetry-ingestion=0.75 + irrigation-prediction=0.5 = 3.25 de 4 -
  # ainda sobra ~0.75 nucleo de folga pro SO/editor/Chrome. Baixamos o
  # telemetry-ingestion de 1.0 para 0.75 para abrir espaço: ele é,
  # disparado, o serviço mais leve da stack (I/O-bound, sem
  # processamento pesado), então é o que sobra mais margem pra cortar
  # sem sentir diferença real.
  irrigation-prediction:
    build:
      context: ../services/irrigation-prediction-py
      dockerfile: Dockerfile
    container_name: dropsense-irrigation-prediction
    mem_limit: 192m
    cpus: 0.5
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKERS=kafka:9092
      # WINDOW_SIZE_SECONDS e DECISION_INTERVAL_SECONDS: opcionais,
      # defaults são 300 (5min) e 60 (1min) - ver app/config.py.
      # - WINDOW_SIZE_SECONDS=300
      # - DECISION_INTERVAL_SECONDS=60
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  dropsense-kafka-data:
  dropsense-postgres-data:
