version: "3.8"

# AgroFlow - Infraestrutura local de desenvolvimento
#
# Filosofia deste arquivo: rodar o mínimo necessário com o mínimo de RAM,
# mantendo os conceitos arquiteturais corretos (ver docs/01-CONTEXTO-PROJETO.md
# e a Parte 3 - Arquitetura no README de cada serviço).
#
# - Kafka em modo KRaft (sem Zookeeper), single-node, heap limitado.
# - Postgres ÚNICO, com 3 databases lógicos (um por serviço) criados via
#   script de init. Isso respeita "database per service" no nível de
#   propriedade/acesso aos dados, sem multiplicar processos na máquina.

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: agroflow-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Conveniente em dev. Em produção os tópicos seriam criados
      # explicitamente (com partições/retenção definidas) e essa flag iria pra false.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
    volumes:
      - agroflow-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768m

  postgres:
    image: postgres:16-alpine
    container_name: agroflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agroflow
      POSTGRES_PASSWORD: agroflow_dev_only
      # Banco "default" exigido pela imagem; os bancos reais de cada
      # serviço são criados pelo script abaixo.
      POSTGRES_DB: postgres
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
      - agroflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agroflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  agroflow-kafka-data:
  agroflow-postgres-data:
