# DropSense - Infraestrutura local de desenvolvimento
#
# Filosofia deste arquivo: rodar o minimo necessario com o minimo de RAM,
# mantendo os conceitos arquiteturais corretos (ver docs/01-CONTEXTO-PROJETO.md
# e a Parte 3 - Arquitetura no README de cada servico).
#
# - Kafka em modo KRaft (sem Zookeeper), single-node, heap limitado.
# - Postgres UNICO, com 3 databases logicos (um por servico) criados via
#   script de init.
#
# Nota sobre limites de memoria: usamos "mem_limit" direto no servico
# (em vez de "deploy.resources.limits.memory") porque esse ultimo so e
# garantido em modo Swarm - em "docker compose up" puro o comportamento
# varia entre versoes da CLI. "mem_limit" e honrado de forma confiavel
# em qualquer cenario.
#
# Nota sobre limites de CPU: pelo mesmo motivo acima, usamos "cpus"
# direto no servico (equivalente em CPU ao "mem_limit"). Isso vira uma
# cgroup CPU quota pro container - o Docker simplesmente pausa o
# processo quando ele excede a fracao de nucleo configurada num dado
# periodo (~100ms).
#
# Os valores abaixo assumem uma maquina de 4 nucleos logicos com 8GB de
# RAM (perfil comum de notebook de estudo). Ajuste proporcionalmente
# se o seu numero de nucleos for diferente:
#   - Linux/WSL: rode `nproc` num terminal.
#   - Docker Desktop (Mac/Windows): Settings > Resources > CPUs - esse
#     numero (da VM do Docker Desktop), e nao o do hardware fisico, e o
#     teto real que os containers competem entre si.
# Orcamento com 4 nucleos: kafka=1.5 + postgres=0.5 + ingestion=1.0 =
# 3.0 de 4 - sobra 1 nucleo de folga pro SO, pro proprio Docker Desktop
# e pro seu editor/terminal. Nunca aloque 100% dos nucleos aos
# containers: sem folga, a maquina toda fica lenta, nao so o Kafka.
#
# Sobre o Go especificamente: a partir do Go 1.25 (ago/2025), a runtime
# passou a ler a CPU quota do cgroup e ajustar GOMAXPROCS automaticamente
# (https://go.dev/blog/container-aware-gomaxprocs) - isso so vale se o
# go.mod do servico declarar `go 1.25` ou mais novo. Com isso, o "cpus"
# abaixo, por si so, ja basta: nao e mais necessario importar
# go.uber.org/automaxprocs manualmente (eh literalmente a mesma logica
# que a Uber escreveu, hoje embutida na stdlib). Se o go.mod ainda
# declarar uma versao anterior a 1.25, ou se quiser fixar um valor
# manualmente independente da deteccao automatica, descomente a linha
# GOMAXPROCS no environment do servico telemetry-ingestion abaixo.

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: dropsense-kafka
    mem_limit: 768m
    cpus: 1.5
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Antes era "true" (conveniente em dev, mas é exatamente o que
      # causava a corrida "UNKNOWN_TOPIC_OR_PARTITION" na primeira
      # mensagem publicada em qualquer tópico novo - o producer
      # pergunta sobre o tópico, isso DISPARA a criação, mas a
      # resposta dessa primeira pergunta ainda vem como "não existe").
      # Agora os tópicos são criados explicitamente pelo serviço
      # kafka-init, abaixo, antes de qualquer producer/consumer real
      # subir - então essa flag pode (e deve) ir para false: qualquer
      # publish num tópico que não foi criado de propósito agora é um
      # erro real, não mais corrigido magicamente.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
    volumes:
      - dropsense-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # kafka-init roda uma vez, cria os 4 tópicos que os serviços
  # realmente usam hoje, e termina (não fica residente - sem
  # mem_limit/cpus, porque não compete por recurso de forma contínua
  # como os outros serviços). --if-not-exists torna seguro rodar de
  # novo em todo "docker compose up", sem dar erro se os tópicos já
  # existirem (mesmo padrão do CREATE DATABASE no script SQL do
  # Postgres).
  #
  # zone.events.v1 e alerts.sla.v1 (do README) ficam de fora de
  # propósito: nenhum serviço publica ou consome eles ainda - criar
  # tópico que nada usa seria antecipar escopo que não existe.
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: dropsense-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    # Não sobrescrevemos "entrypoint" de propósito - o entrypoint
    # original da imagem (visível como "/__cacert_entrypoin..." no
    # "docker compose ps") faz setup de certificados antes de exec'ar
    # o comando; só trocamos o "command" (o CMD), que é o que esse
    # entrypoint executa por último. set -e garante que, se algum
    # kafka-topics.sh falhar de verdade (não por já existir - isso o
    # --if-not-exists já trata), o container todo sai com erro, e os
    # serviços que dependem de "service_completed_successfully" nunca
    # sobem com tópico faltando sem ninguém notar.
    command:
      - /bin/sh
      - -c
      - |
        set -e
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic telemetry.readings.v1 --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic weather.forecasts.v1 --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic irrigation.decisions.v1 --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic irrigation.events.v1 --partitions 1 --replication-factor 1
        echo "kafka-init: todos os topicos confirmados"
  postgres:
    image: postgres:16-alpine
    container_name: dropsense-postgres
    mem_limit: 256m
    cpus: 0.25
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: dropsense
      POSTGRES_PASSWORD: dropsense_dev_only
      POSTGRES_DB: postgres
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
      - dropsense-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dropsense -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  telemetry-ingestion:
    build:
      context: ../services/telemetry-ingestion-go
      dockerfile: Dockerfile
    container_name: dropsense-telemetry-ingestion
    mem_limit: 64m
    cpus: 0.75
    ports:
      - "8080:8080"
    # GOMAXPROCS manual - so necessario se o go.mod deste servico
    # declarar uma versao do Go anterior a 1.25 (sem deteccao
    # automatica de cgroup), ou se quiser fixar o valor "na mao"
    # independente do que o runtime detectar. Em Go 1.25+ a linha
    # "cpus: 1.0" acima ja basta, isso aqui fica redundante (e o
    # proprio runtime ignora a env var se ela vier vazia/ausente).
    # environment:
    #   - GOMAXPROCS=1
    environment:
      - KAFKA_BROKERS=kafka:9092
      # WEATHER_POLL_INTERVAL: opcional, default é 30m (ver main.go).
      # Só setar se quiser um intervalo diferente de consulta ao
      # Open-Meteo - aceita qualquer valor que time.ParseDuration
      # entenda (ex.: "10m", "1h").
      # - WEATHER_POLL_INTERVAL=10m
    # Faltava desde sempre: os outros serviços (postgres, irrigation-
    # prediction, farm-management) já tinham healthcheck, mas este
    # não - só o endpoint /healthz existia, sem nada batendo nele.
    # Importa agora porque o mock-sensors precisa de
    # "service_healthy" pra saber esperar o broker HTTP estar de pé
    # de verdade, não só o container ter "iniciado". wget é o
    # busybox que já vem no Alpine - sem instalar nada extra.
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Agora SIM precisa esperar o Kafka: o publisher real
    # (internal/kafka.Producer) substituiu o StdoutPublisher, então o
    # serviço não tem mais como funcionar sem o broker de pé. O Kafka
    # já tem healthcheck configurado acima, então usamos ele em vez de
    # só "started" (que marcaria como pronto antes do broker aceitar
    # conexões de fato). kafka-init garante que os tópicos já existem
    # antes deste serviço tentar publicar a primeira mensagem.
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  # Orçamento de CPU revisado (4 núcleos, 6 serviços): kafka=1.5 +
  # postgres=0.25 + telemetry-ingestion=0.75 + irrigation-prediction=0.5
  # + farm-management=0.5 + mock-sensors=0.25 = 3.75 de 4 - sobra só
  # 0.25 núcleo de folga, ficando mais apertado a cada fase nova (era
  # 0.5 antes deste serviço entrar). mock-sensors é diferente dos
  # outros cinco nesse ponto: ele é uma ferramenta de TESTE, não uma
  # peça permanente da arquitetura - quando não estiver testando,
  # `docker compose stop mock-sensors` devolve esses 0.25 núcleos sem
  # afetar o resto do sistema, que continua rodando normalmente.
  irrigation-prediction:
    build:
      context: ../services/irrigation-prediction-py
      dockerfile: Dockerfile
    container_name: dropsense-irrigation-prediction
    mem_limit: 192m
    cpus: 0.5
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKERS=kafka:9092
      # WINDOW_SIZE_SECONDS e DECISION_INTERVAL_SECONDS: opcionais,
      # defaults são 300 (5min) e 60 (1min) - ver app/config.py.
      # - WINDOW_SIZE_SECONDS=300
      # - DECISION_INTERVAL_SECONDS=60
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  farm-management:
    build:
      context: ../services/farm-management-csharp
      dockerfile: Dockerfile
    container_name: dropsense-farm-management
    mem_limit: 256m
    cpus: 0.5
    ports:
      - "8090:8080"
    environment:
      - KAFKA_BROKERS=kafka:9092
      # KAFKA_CONSUMER_GROUP: opcional, default é "farm-management"
      # (ver Program.cs).
      # - KAFKA_CONSUMER_GROUP=farm-management
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  # Lê data/sensor-readings.csv (gerado pelo script Python do Colab -
  # ver gerar_sensores_dropsense.py) e dispara as leituras pro
  # telemetry-ingestion de verdade, um tick por vez. O CSV nunca
  # carrega timestamp: measuredAt é carimbado aqui, no instante real
  # do envio (ver internal/sender/client.go).
  #
  # TICK_INTERVAL=2.5s é calibrado pro CSV padrão do gerador (2h
  # simuladas, 30s entre leituras = 240 ticks): 240 × 2.5s = 600s =
  # 10 minutos por passada completa - o "primeiro teste" combinado.
  # Esse número não tem relação obrigatória com os 30s simulados
  # dentro do arquivo, são dois relógios independentes - mude livre
  # se gerar um CSV com outra duração.
  mock-sensors:
    build:
      context: ../services/mock-sensors-go
      dockerfile: Dockerfile
    container_name: dropsense-mock-sensors
    mem_limit: 64m
    cpus: 0.25
    volumes:
      - ../data/sensor-readings.csv:/data/sensor-readings.csv:ro
    environment:
      - TELEMETRY_INGESTION_URL=http://telemetry-ingestion:8080
      - CSV_PATH=/data/sensor-readings.csv
      - TICK_INTERVAL=2.5s
      - LOOP=true
      # STARTUP_DELAY: dá um respiro antes do primeiro tick (que,
      # por desenho, dispara imediato) - cobre o cenário de toda a
      # stack subindo junto, mesmo com telemetry-ingestion já tendo
      # confirmado o Kafka via Ping antes de aceitar requisições.
      # 2m é o valor pedido pra este teste - reduza ou remova
      # (default é 0s) depois que a inicialização a frio parar de
      # ser uma variável em jogo.
      - STARTUP_DELAY=2m
    depends_on:
      telemetry-ingestion:
        condition: service_healthy

volumes:
  dropsense-kafka-data:
  dropsense-postgres-data: